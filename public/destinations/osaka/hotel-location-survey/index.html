<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>오사카 숙소 위치 추천 | 여행 스타일별 호텔 위치 찾기</title>
<meta content="오사카 여행 스타일에 맞춰 난바, 우메다, 신사이바시, 텐노지, 유니버설시티, 베이 에어리어 중 호텔을 잡기 좋은 위치를 추천합니다." name="description"/>
<link href="/destinations/osaka/hotel-location-survey/" rel="canonical"/>
<meta content="website" property="og:type"/>
<meta content="Wacky Travel" property="og:site_name"/>
<meta content="오사카 숙소 위치 추천 | 여행 스타일별 호텔 위치 찾기" property="og:title"/>
<meta content="난바·우메다·신사이바시·텐노지·USJ 중 내 일정에 맞는 오사카 숙소 위치를 찾아보세요." property="og:description"/>
<meta content="/destinations/osaka/hotel-location-survey/" property="og:url"/>
<meta content="ko_KR" property="og:locale"/>
<link href="/favicon.ico" rel="icon" sizes="any"/>
<style>
    * {
      box-sizing: border-box;
    }

    :root {
      --wt-ink: #132235;
      --wt-muted: #64748b;
      --wt-subtle: #eef4fb;
      --wt-soft: #f7fafc;
      --wt-soft-blue: #eff6ff;
      --wt-blue: #2563eb;
      --wt-blue-deep: #1d4ed8;
      --wt-soft-blue-2: #eff6ff;
      --wt-soft-sky: #f8fbff;
      --wt-white: #ffffff;
      --wt-radius-lg: 30px;
      --wt-radius-md: 22px;
      --wt-radius-sm: 16px;
      --wt-page-width: 980px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      color: var(--wt-ink);
      background: #ffffff;
      line-height: 1.65;
      word-break: keep-all;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font-family: inherit;
    }

    a {
      color: inherit;
    }

    .wt-location-page {
      min-height: 100vh;
      padding: clamp(30px, 5vw, 64px) clamp(20px, 4vw, 32px);
      background: #ffffff;
    }

    .wt-location-shell {
      width: 100%;
      max-width: var(--wt-page-width);
      margin: 0 auto;
    }

    .wt-survey-wrap {
      overflow: hidden;
      border-radius: var(--wt-radius-lg);
      background: var(--wt-white);
    }

    .wt-survey-wrap.is-result-mode .wt-survey-hero,
    .wt-survey-wrap.is-survey-started .wt-survey-hero,
    .wt-survey-wrap.is-survey-started .wt-survey-start {
      display: none;
    }

    .wt-location-page.is-survey-started .wt-survey-top-link {
      display: none;
    }

    .wt-location-page:not(.is-survey-started) {
      display: flex;
      align-items: center;
      min-height: 100svh;
      padding-top: clamp(28px, 5vw, 58px);
      padding-bottom: clamp(34px, 6vw, 70px);
    }

    .wt-location-page:not(.is-survey-started) .wt-location-shell {
      max-width: 860px;
    }

    .wt-location-page:not(.is-survey-started) .wt-survey-wrap {
      overflow: visible;
    }

    .wt-location-page:not(.is-survey-started) .wt-survey-top-link {
      margin-bottom: clamp(16px, 3vw, 26px);
    }

    .wt-location-page:not(.is-survey-started) .wt-survey-hero {
      text-align: center;
      box-shadow: 0 22px 54px rgba(15, 35, 56, 0.08);
    }

    .wt-location-page:not(.is-survey-started) .wt-survey-kicker {
      margin-left: auto;
      margin-right: auto;
    }

    .wt-location-page:not(.is-survey-started) .wt-survey-title,
    .wt-location-page:not(.is-survey-started) .wt-survey-desc {
      margin-left: auto;
      margin-right: auto;
    }

    .wt-location-page:not(.is-survey-started) .wt-survey-start {
      padding-top: clamp(22px, 4vw, 36px);
    }

    .wt-survey-hero {
      padding: clamp(34px, 6vw, 58px) clamp(22px, 5vw, 50px) clamp(26px, 4vw, 40px);
      border-radius: var(--wt-radius-lg);
      background: linear-gradient(135deg, #f8fbff 0%, #ffffff 58%, #eff6ff 100%);
    }

    .wt-survey-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: var(--wt-blue-deep);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .wt-survey-title {
      max-width: 690px;
      margin: 0;
      font-size: clamp(31px, 4.5vw, 48px);
      line-height: 1.16;
      letter-spacing: -0.055em;
      color: #102a45;
    }

    .wt-survey-desc {
      max-width: 700px;
      margin: 18px 0 0;
      color: var(--wt-muted);
      font-size: 16px;
    }

    .wt-survey-start {
      display: flex;
      justify-content: center;
      padding: clamp(24px, 4vw, 34px) clamp(22px, 5vw, 50px) 0;
      background: #ffffff;
    }

    .wt-survey-start .wt-btn {
      min-width: 180px;
      min-height: 52px;
      padding: 0 28px;
      font-size: 16px;
    }

    .wt-survey-body {
      display: none;
      padding: clamp(24px, 5vw, 44px) 0 0;
      background: #ffffff;
    }

    .wt-survey-wrap.is-survey-started .wt-survey-body {
      display: block;
    }

    .wt-survey-card,
    .wt-result-card {
      border-radius: var(--wt-radius-lg);
      background: #ffffff;
    }

    .wt-survey-card {
      padding: clamp(24px, 5vw, 46px);
      background: #ffffff;
    }

    .wt-progress {
      margin-bottom: 30px;
    }

    .wt-progress-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      color: var(--wt-muted);
      font-size: 14px;
    }

    .wt-progress-bar {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6edf5;
    }

    .wt-progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: var(--wt-blue);
      transition: width 0.25s ease;
    }

    .wt-question-title {
      margin: 0 0 8px;
      color: var(--wt-ink);
      font-size: clamp(23px, 3vw, 29px);
      line-height: 1.34;
      letter-spacing: -0.045em;
    }

    .wt-question-help {
      margin: 0 0 24px;
      color: var(--wt-muted);
      font-size: 15px;
    }

    .wt-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .wt-option {
      width: 100%;
      min-height: 112px;
      padding: 18px;
      border: 0;
      border-radius: var(--wt-radius-md);
      background: #ffffff;
      color: var(--wt-ink);
      text-align: left;
      cursor: pointer;
    }

    .wt-option:focus-visible,
    .wt-btn:focus-visible,
    .wt-survey-top-link:focus-visible,
    .wt-related-link:focus-visible,
    .wt-post-list a:focus-visible,
    .wt-hotel-link:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.28);
      outline-offset: 3px;
    }

    .wt-option.is-selected {
      background: var(--wt-soft-blue);
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.42);
    }

    .wt-option-title {
      display: block;
      color: var(--wt-ink);
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: -0.025em;
    }

    .wt-option-desc {
      display: block;
      margin-top: 7px;
      color: var(--wt-muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .wt-survey-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 30px;
    }

    .wt-btn {
      min-height: 48px;
      padding: 0 22px;
      border: 0;
      border-radius: 999px;
      background: var(--wt-blue);
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .wt-btn:disabled {
      background: #d5dee8;
      color: #ffffff;
      cursor: not-allowed;
    }

    .wt-btn--ghost {
      background: #edf3f8;
      color: #36516b;
    }

    .wt-result {
      display: none;
    }

    .wt-result.is-active {
      display: block;
    }

    .wt-result-card {
      padding: clamp(24px, 5vw, 44px);
      background: linear-gradient(180deg, #eef7ff 0%, #ffffff 32%, #ffffff 100%);
    }

    .wt-result-label {
      display: inline-flex;
      margin: 0 0 12px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: var(--wt-blue-deep);
      font-size: 13px;
      font-weight: 500;
    }

    .wt-result-title {
      margin: 0;
      color: #102a45;
      font-size: clamp(31px, 5vw, 48px);
      line-height: 1.16;
      letter-spacing: -0.055em;
    }

    .wt-result-summary {
      max-width: 720px;
      margin: 16px 0 0;
      color: var(--wt-muted);
      font-size: 16px;
    }

    .wt-result-lead {
      margin-top: 28px;
      padding: 20px;
      border-radius: var(--wt-radius-md);
      background: #ffffff;
    }

    .wt-result-lead strong {
      display: block;
      margin-bottom: 6px;
      color: var(--wt-ink);
      font-size: 17px;
      letter-spacing: -0.025em;
    }

    .wt-result-lead p {
      margin: 0;
      color: #53667a;
      font-size: 14px;
    }

    .wt-result-story {
      margin-top: 36px;
      padding: clamp(20px, 4vw, 30px);
      border-radius: var(--wt-radius-md);
      background: #ffffff;
    }

    .wt-result-story-head {
      max-width: 760px;
    }

    .wt-result-story-title {
      margin: 0;
      color: var(--wt-ink);
      font-size: clamp(22px, 3vw, 28px);
      line-height: 1.32;
      letter-spacing: -0.04em;
    }

    .wt-result-story-desc {
      margin: 14px 0 0;
      color: #53667a;
      font-size: 15px;
    }


    .wt-reason-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 26px;
    }

    .wt-reason-card {
      padding: 18px;
      border-radius: 20px;
      background: #f8fbfe;
    }

    .wt-reason-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: var(--wt-soft-blue);
      color: var(--wt-blue-deep);
      font-size: 13px;
      font-weight: 500;
    }

    .wt-reason-card h4 {
      margin: 0;
      color: var(--wt-ink);
      font-size: 16px;
      line-height: 1.42;
      letter-spacing: -0.03em;
    }

    .wt-reason-card p {
      margin: 8px 0 0;
      color: #53667a;
      font-size: 14px;
    }

    .wt-decision-box {
      margin-top: 24px;
      padding: 18px;
      border-radius: 20px;
      background: #eef7ff;
    }

    .wt-decision-box strong {
      display: block;
      color: #183b5d;
      font-size: 16px;
      letter-spacing: -0.025em;
    }

    .wt-decision-box p {
      margin: 8px 0 0;
      color: #405871;
      font-size: 14px;
    }

    .wt-result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .wt-info-box {
      padding: 20px;
      border-radius: var(--wt-radius-md);
      background: #f7fafc;
    }

    .wt-info-box--soft-blue {
      background: var(--wt-soft-blue-2);
    }

    .wt-info-box--soft-sky {
      background: var(--wt-soft-sky);
    }

    .wt-info-box h3 {
      margin: 0 0 10px;
      color: var(--wt-ink);
      font-size: 17px;
      line-height: 1.45;
      letter-spacing: -0.03em;
    }

    .wt-info-box p {
      margin: 0;
      color: #53667a;
      font-size: 14px;
    }

    .wt-bullet-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #53667a;
      font-size: 14px;
    }

    .wt-bullet-list li {
      position: relative;
      padding-left: 15px;
    }

    .wt-bullet-list li::before {
      content: "";
      position: absolute;
      top: 0.74em;
      left: 0;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--wt-blue);
    }

    .wt-fit-list {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .wt-fit-item {
      padding: 16px;
      border-radius: 18px;
      background: #f8fafc;
    }

    .wt-fit-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      color: #273b51;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .wt-fit-badge {
      flex: 0 0 auto;
      padding: 5px 9px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--wt-blue-deep);
      font-size: 12px;
      font-weight: 500;
    }

    .wt-fit-line {
      width: 100%;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #e9eff6;
    }

    .wt-fit-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--wt-blue);
    }



    .wt-hotel-section {
      margin-top: 40px;
      padding: 22px;
      border-radius: var(--wt-radius-md);
      background: #f8fafc;
    }

    .wt-section-heading {
      margin-bottom: 22px;
    }

    .wt-section-eyebrow {
      margin: 0 0 6px;
      color: var(--wt-blue-deep);
      font-size: 13px;
      font-weight: 500;
    }

    .wt-section-title {
      margin: 0;
      color: var(--wt-ink);
      font-size: 20px;
      line-height: 1.4;
      letter-spacing: -0.035em;
    }

    .wt-section-desc {
      margin: 8px 0 0;
      color: var(--wt-muted);
      font-size: 14px;
    }

    .wt-hotel-grid {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x mandatory;
      padding: 2px 2px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .wt-hotel-grid::-webkit-scrollbar {
      height: 8px;
    }

    .wt-hotel-grid::-webkit-scrollbar-track {
      border-radius: 999px;
      background: #edf2f7;
    }

    .wt-hotel-grid::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.28);
    }

    .wt-hotel-card {
      display: flex;
      flex: 0 0 292px;
      flex-direction: column;
      min-height: 100%;
      padding: 18px;
      border-radius: 20px;
      background: #ffffff;
      scroll-snap-align: start;
    }

    .wt-hotel-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .wt-hotel-rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--wt-soft-blue);
      color: var(--wt-blue-deep);
      font-size: 13px;
      font-weight: 500;
    }

    .wt-hotel-tag {
      padding: 6px 9px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #405871;
      font-size: 12px;
      font-weight: 500;
      text-align: right;
    }

    .wt-hotel-name {
      margin: 0;
      color: var(--wt-ink);
      font-size: 17px;
      line-height: 1.42;
      letter-spacing: -0.03em;
    }

    .wt-hotel-location {
      margin: 7px 0 0;
      color: var(--wt-blue-deep);
      font-size: 13px;
      font-weight: 500;
    }

    .wt-hotel-reason {
      margin: 10px 0 0;
      color: #53667a;
      font-size: 14px;
    }

    .wt-hotel-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 13px;
    }

    .wt-hotel-meta span {
      padding: 5px 8px;
      border-radius: 999px;
      background: #f6f8fb;
      color: #5e7084;
      font-size: 12px;
      font-weight: 500;
    }

    .wt-hotel-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      margin-top: auto;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--wt-blue);
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .wt-hotel-link-wrap {
      margin-top: 16px;
    }

    .wt-post-list-section {
      margin-top: 30px;
      padding: 22px;
      border-radius: var(--wt-radius-md);
      background: #ffffff;
    }

    .wt-post-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .wt-post-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #f8fafc;
      color: #20364c;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.45;
    }

    .wt-post-list a::after {
      content: "→";
      flex: 0 0 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--wt-soft-blue);
      color: var(--wt-blue-deep);
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
    }

    .wt-related {
      margin-top: 34px;
      padding: 22px;
      border-radius: var(--wt-radius-md);
      background: #f8fafc;
    }

    .wt-related h3 {
      margin: 0 0 12px;
      color: var(--wt-ink);
      font-size: 18px;
      line-height: 1.4;
      letter-spacing: -0.025em;
    }

    .wt-related-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .wt-related-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--wt-blue-deep);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .wt-reset-area {
      display: flex;
      justify-content: center;
      margin-top: 34px;
    }


    .wt-survey-top-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 24px;
      padding: 10px 14px;
      border: 0;
      border-radius: 999px;
      background: #f7faff;
      color: #24364b;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .wt-survey-top-link::before {
      content: "←";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--wt-blue-deep);
      font-size: 14px;
      line-height: 1;
    }

    @media (max-width: 820px) {
      .wt-result-grid,
      .wt-reason-list {
        grid-template-columns: 1fr;
      }

      .wt-hotel-grid {
        display: grid;
        grid-template-columns: 1fr;
        overflow: visible;
        padding: 0;
      }

      .wt-hotel-card {
        flex-basis: auto;
      }

      .wt-options {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .wt-location-page {
        padding: 26px 20px 18px;
      }

      .wt-survey-hero {
        padding: 30px 20px 24px;
      }

      .wt-survey-card,
      .wt-result-card {
        padding: 24px 20px;
      }

      .wt-survey-title {
        font-size: clamp(30px, 9vw, 40px);
        line-height: 1.12;
      }

      .wt-survey-top-link {
        margin: 0 0 22px;
        padding: 9px 13px;
      }

      .wt-survey-hero,
      .wt-survey-card,
      .wt-result-card {
        border-radius: 24px;
      }

      .wt-survey-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        align-items: stretch;
      }

      .wt-btn {
