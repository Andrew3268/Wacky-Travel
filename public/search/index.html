<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>검색 결과 | Wacky Travel</title>
  <meta name="description" content="와키트래블 여행지, 호텔 추천, 이동 정보 콘텐츠를 검색합니다." />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="/search/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Wacky Travel" />
  <meta property="og:title" content="검색 결과 | Wacky Travel" />
  <meta property="og:description" content="와키트래블 여행지, 호텔 추천, 이동 정보 콘텐츠를 검색합니다." />
  <meta property="og:url" content="/search/" />
  <meta property="og:image" content="/assets/images/logo.png" />
  <meta property="og:locale" content="ko_KR" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/assets/css/app.css?v=20260618HeroBreadcrumbRefineV19" />
  <link rel="stylesheet" href="/assets/css/components.css?v=20260712UnifiedPromoFooterV1" />
  <link rel="stylesheet" href="/assets/css/travel.css?v=20260720BreadcrumbResponsiveV1" />
</head>
<body class="wtsr-page">
  <header class="topbar topbar--editorial topbar--travel">
    <div class="topbar__inner container">
      <a class="brand" href="/" aria-label="Wacky Travel 홈"><span class="brand__mark">WT</span><span class="brand__text">Wacky Travel</span></a>
    </div>
  </header>

  <main id="main">
    <section class="wtsr-hero" aria-labelledby="wtsrTitle">
      <div class="wtsr-hero__inner wtsr-container">
        <div class="wtsr-hero__copy">
          <p class="wtsr-eyebrow">SEARCH</p>
          <h1 id="wtsrTitle">여행 콘텐츠<br />검색</h1>
          <p class="wtsr-hero__desc">도시명이나 호텔명을 입력하면 제목에 해당 검색어가 포함된 글만 보여드립니다.</p>
        </div>

        <form class="wtsr-form" id="wtsrForm" action="/search/" method="get" role="search" autocomplete="off">
          <label class="wtsr-form__label" for="wtsrInput">검색어</label>
          <div class="wtsr-form__row">
            <input id="wtsrInput" type="search" name="q" placeholder="예: 다낭, 후쿠오카, 난바 호텔" aria-label="검색어 입력" />
            <button class="wtsr-form__button" type="submit" aria-label="검색하기">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"></circle><path d="m15.5 15.5 5 5"></path></svg>
            </button>
          </div>
          <p class="wtsr-form__hint">본문·태그·설명은 검색 대상에서 제외됩니다.</p>
        </form>
      </div>
    </section>

    <section class="wtsr-section wtsr-container" aria-labelledby="wtsrSummaryTitle">
      <div class="wtsr-shell">
        <div class="wtsr-summary" id="wtsrSummary">
          <div class="wtsr-summary__copy">
            <p class="wtsr-summary__eyebrow">SEARCH RESULTS</p>
            <h2 id="wtsrSummaryTitle">검색어를 입력해 주세요</h2>
            <p id="wtsrSummaryText">원하는 도시명이나 호텔명을 검색해 보세요.</p>
          </div>
          <span class="wtsr-count" id="wtsrCount" hidden>0개 결과</span>
        </div>

        <div class="wtsr-results" id="wtsrResults" aria-live="polite"></div>
        <div class="wtsr-more"><button class="wtsr-more__button" id="wtsrMoreBtn" type="button" hidden>더 보기</button></div>
      </div>
    </section>
  </main>

  <footer class="wtpromo-footer">
  <div class="wtpromo-footer__inner wtpromo-container">
    <div>
      <div class="wtpromo-footer-brand">Wacky Travel</div>
      <p class="wtpromo-footer-copy">© 2026 Wacky Travel<br>예약 전 가격, 취소 조건, 세금 포함 여부를 다시 확인하세요.</p>
    </div>
    <nav class="wtpromo-footer-links" aria-label="하단 메뉴">
      <a href="/about/">소개</a>
      <a href="/destinations/">여행지</a>
      <a href="/search/">검색</a>
    </nav>
  </div>
</footer>

  <script src="/assets/js/search-results.js?v=20260712TitleOnlyV2" defer></script>
</body>
</html>
